<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradex Upload Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; font-size: 1.6rem; }
    .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 1.2rem; }
    .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.3rem; }
    input[type="text"], input[type="password"], textarea, input[type="file"] {
      width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid #475569;
      background: #0f172a; color: #e2e8f0; font-size: 0.9rem; margin-bottom: 0.6rem;
    }
    textarea { min-height: 120px; font-family: monospace; resize: vertical; }
    button {
      padding: 0.6rem 1.4rem; border: none; border-radius: 6px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-purple { background: #a855f7; color: #fff; }
    .row { display: flex; gap: 0.6rem; align-items: center; }
    #response {
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      padding: 0.8rem; font-family: monospace; font-size: 0.85rem;
      white-space: pre-wrap; min-height: 60px; color: #67e8f9;
    }
    .status { font-size: 0.8rem; margin-top: 0.4rem; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .token-display { font-size: 0.75rem; word-break: break-all; color: #facc15; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <h1>⚡ Tradex Upload Client</h1>
  <div class="container">

    <!-- Base URL -->
    <div class="card">
      <h2>🔗 Base URL</h2>
      <input type="text" id="baseUrl" value="http://localhost:8080" />
    </div>

    <!-- Login / Register -->
    <div class="card">
      <h2>🔑 Step 1 — Auth (Register or Login)</h2>
      <div class="row">
        <div style="flex:1"><label>Username</label><input type="text" id="username" value="admin" /></div>
        <div style="flex:1"><label>Password</label><input type="password" id="password" value="password" /></div>
      </div>
      <div class="row" style="margin-top: 0.6rem;">
        <button class="btn-blue" onclick="login()">Login &amp; Get Token</button>
        <button class="btn-purple" style="background:#8b5cf6;" onclick="register()">Register New User</button>
      </div>
      <div id="loginStatus" class="status"></div>
      <div id="tokenDisplay" class="token-display"></div>
    </div>

    <!-- Upload JSON (raw body) -->
    <div class="card">
      <h2>📄 Step 2a — Send Raw JSON</h2>
      <label>Paste trade JSON below:</label>
      <textarea id="jsonBody">{
  "tradeType": "BUY",
  "portfolioId": "PF1001",
  "brokerId": "BRK789",
  "symbol": "INFY",
  "quantity": 100,
  "price": 1450.75,
  "currency": "INR",
  "tradeDate": "2026-03-09",
  "exchange": "NSE",
  "clientId": "CLT456"
}</textarea>
      <button class="btn-green" onclick="sendJson()">Upload JSON</button>
    </div>

    <!-- Upload File -->
    <div class="card">
      <h2>📁 Step 2b — Upload File</h2>
      <label>Select a .json file:</label>
      <input type="file" id="fileInput" accept=".json,.txt" />
      <button class="btn-purple" onclick="uploadFile()">Upload File</button>
    </div>

    <!-- Response -->
    <div class="card">
      <h2>📬 Response</h2>
      <div id="response">Waiting...</div>
    </div>
  </div>

<script>
  let jwtToken = '';

  function base() { return document.getElementById('baseUrl').value.replace(/\/+$/, ''); }

  function showResponse(data, isError) {
    const el = document.getElementById('response');
    el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    el.style.color = isError ? '#f87171' : '#67e8f9';
  }

  async function register() {
    const status = document.getElementById('loginStatus');
    const tokenEl = document.getElementById('tokenDisplay');
    status.textContent = 'Registering...';
    status.className = 'status';
    tokenEl.textContent = '';
    
    try {
      const res = await fetch(base() + '/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.text();
      if (res.ok) {
        status.textContent = '✅ Registered successfully! Please click Login.';
        status.className = 'status ok';
        showResponse(data);
      } else {
        status.textContent = '❌ Registration failed';
        status.className = 'status err';
        showResponse(data, true);
      }
    } catch (e) {
      status.textContent = '❌ ' + e.message;
      status.className = 'status err';
      showResponse(e.message, true);
    }
  }

  async function login() {
    const status = document.getElementById('loginStatus');
    const tokenEl = document.getElementById('tokenDisplay');
    try {
      const res = await fetch(base() + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        jwtToken = data.token;
        status.textContent = '✅ Logged in!';
        status.className = 'status ok';
        tokenEl.textContent = 'Token: ' + jwtToken.substring(0, 40) + '...';
        showResponse(data);
      } else {
        status.textContent = '❌ Login failed';
        status.className = 'status err';
        showResponse(data, true);
      }
    } catch (e) {
      status.textContent = '❌ ' + e.message;
      status.className = 'status err';
      showResponse(e.message, true);
    }
  }

  async function sendJson() {
    if (!jwtToken) { showResponse('Please login first!', true); return; }
    try {
      const res = await fetch(base() + '/api/files/upload/json', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + jwtToken
        },
        body: document.getElementById('jsonBody').value
      });
      const data = await res.json();
      showResponse(data, !res.ok);
    } catch (e) { showResponse(e.message, true); }
  }

  async function uploadFile() {
    if (!jwtToken) { showResponse('Please login first!', true); return; }
    const file = document.getElementById('fileInput').files[0];
    if (!file) { showResponse('Please select a file!', true); return; }
    try {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(base() + '/api/files/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + jwtToken },
        body: form
      });
      const data = await res.json();
      showResponse(data, !res.ok);
    } catch (e) { showResponse(e.message, true); }
  }
</script>
</body>
</html>
